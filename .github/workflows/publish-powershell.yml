name: Publish powershell

on:
  workflow_call:
    inputs:
      event_json:
        required: true
        type: string
    secrets:
      # RELEASE_BOT_GITHUB_TOKEN:
      #   required: true
      DUSTY_RELEASE_BOT_PRIVATE_KEY:
        required: true
      PSGALLERY_API_KEY:
        required: true

permissions:
  contents: write

defaults:
  run:
    shell: pwsh

jobs:
  publish-powershell:
    runs-on: ubuntu-latest
    steps:
      # - name: Generate JWT
      #   id: jwt
      #   uses: fsackur/ci/.github/actions/create-app-jwt@main
      #   with:
      #     client-id: Iv23livEMJ78hqrlVA1o  # dusty-release-bot-app
      #     private-key: ${{ secrets.DUSTY_RELEASE_BOT_PRIVATE_KEY }}

      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: 1082187  # dusty-release-bot-app
          private-key: ${{ secrets.DUSTY_RELEASE_BOT_PRIVATE_KEY }}

      - name: Get bot user ID
        id: bot-id
        run: echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - uses: actions/checkout@v4
        with:
          fetch-tags: true
          # token: ${{ secrets.RELEASE_BOT_GITHUB_TOKEN }}
          # token: ${{ steps.app-token.outputs.token }}
          # Make sure the value of GITHUB_TOKEN will not be persisted in repo's config
          # persist-credentials: false

      - uses: fsackur/ci/.github/actions/setup-powershell@main

      - name: Update version
        run: |
          $Labels = @'
            ${{ toJson(fromJson(inputs.event_json).pull_request.labels.*.name) }}
          '@ | ConvertFrom-Json

          $ReleaseLabel = @($Labels) -match '^release-'
          if ($ReleaseLabel.Count -gt 1)
          {
              "Multiple release labels found: $ReleaseLabel" | Write-Host -ForegroundColor Red
              exit 1
          }

          $Release = if ($ReleaseLabel) {$ReleaseLabel -replace '^release-'} else {'${{ inputs.release }}'}

          Invoke-Build UpdateVersion -Release $Release

      - name: Test
        run: |
          Invoke-Build Build, Test

      - name: Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config --global user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config --global user.email '${{ steps.bot-id.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

          Invoke-Build Tag

          git push -f

          Invoke-Build Publish -PSGalleryApiKey '${{ secrets.PSGALLERY_API_KEY }}'
